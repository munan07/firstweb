<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Private Drive — Munan</title>
    <link rel="icon" type="image/png" href="icon.png">
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root {
            --main-bg: linear-gradient(180deg, #0ea5e9 0%, #bae6fd 50%, #ffffff 100%);
            --card-bg: rgba(255, 255, 255, 0.65);
            --card-border: rgba(14, 165, 233, 0.25);
            --text-main: #0f172a;
            --text-muted: #334155;
            --accent: #0284c7;
            --nav-bg: rgba(14, 165, 233, 0.85);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            min-height: 100vh;
            font-family: 'Poppins', sans-serif;
            background: var(--main-bg);
            background-attachment: fixed;
            color: var(--text-main);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        a { text-decoration: none; transition: 0.3s; }

        /* --- NAVBAR --- */
        .navbar {
            display: flex; justify-content: space-between; align-items: center;
            padding: 0 8%; height: 50px; background: var(--nav-bg);
            backdrop-filter: blur(10px); position: fixed; width: 100%; top: 0;
            z-index: 1000; border-bottom: 1px solid var(--card-border);
        }
        .logo { font-size: 1.2rem; font-weight: 700; letter-spacing: 1px; color: var(--text-main); font-family: 'Sora', sans-serif; }
        .logo span { color: #fff; }
        .back-btn {
            display: inline-flex; align-items: center; gap: 8px;
            background: rgba(255,255,255,.55); border: 1px solid rgba(255,255,255,.6);
            border-radius: 20px; padding: 6px 16px;
            font-size: .8rem; font-weight: 600; color: var(--text-main);
            backdrop-filter: blur(8px); transition: 0.3s;
            font-family: 'Sora', sans-serif;
        }
        .back-btn:hover { background: rgba(255,255,255,.85); }
        .back-btn i { font-size: .78rem; transition: transform .3s; }
        .back-btn:hover i { transform: translateX(-3px); }

        /* --- MAIN CARD --- */
        .card {
            background: var(--card-bg);
            backdrop-filter: blur(16px);
            width: 100%;
            max-width: 360px;
            padding: 2.5rem 2rem;
            border-radius: 24px;
            text-align: center;
            box-shadow: 0 8px 32px rgba(2,132,199,.12), inset 0 1px 0 rgba(255,255,255,.8);
            border: 1.5px solid var(--card-border);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }
        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 16px 48px rgba(2,132,199,.18);
        }

        .card-icon {
            width: 72px; height: 72px; border-radius: 18px;
            background: linear-gradient(135deg, #1a73e8, #34a853);
            display: flex; align-items: center; justify-content: center;
            font-size: 2rem; color: #fff;
            margin: 0 auto 1.4rem;
            box-shadow: 0 6px 20px rgba(26,115,232,.3);
        }

        .card h3 {
            font-family: 'Sora', sans-serif;
            font-size: 1.2rem; font-weight: 700;
            color: var(--text-main); margin-bottom: 8px;
        }
        .card p { color: var(--text-muted); font-size: 0.88rem; margin-bottom: 1.8rem; line-height: 1.6; }

        .btn {
            width: 100%; padding: 12px;
            border: none; border-radius: 12px;
            background: var(--accent); color: white;
            font-family: 'Sora', sans-serif;
            font-size: .85rem; font-weight: 600;
            cursor: pointer; transition: 0.3s;
            display: flex; align-items: center;
            justify-content: center; gap: 8px;
            text-decoration: none;
            box-shadow: 0 4px 14px rgba(2,132,199,.3);
        }
        .btn:hover {
            background: #0369a1;
            box-shadow: 0 6px 20px rgba(2,132,199,.4);
            transform: translateY(-1px);
        }
        .btn.cancel {
            background: rgba(255,255,255,.6);
            color: var(--text-muted);
            border: 1.5px solid var(--card-border);
            box-shadow: none;
        }
        .btn.cancel:hover { background: rgba(255,255,255,.9); }
        .btn.success {
            background: linear-gradient(135deg,#16a34a,#22c55e);
            box-shadow: 0 4px 14px rgba(22,163,74,.3);
        }

        /* --- MODAL --- */
        .modal-overlay {
            position: fixed; inset: 0;
            background: rgba(0, 20, 50, 0.35);
            backdrop-filter: blur(8px);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 200;
            padding: 20px;
        }

        .modal {
            background: rgba(255,255,255,.92);
            backdrop-filter: blur(20px);
            padding: 2rem;
            border-radius: 22px;
            width: 100%;
            max-width: 340px;
            text-align: center;
            border: 1.5px solid var(--card-border);
            box-shadow: 0 20px 60px rgba(2,132,199,.18);
            animation: slideUp 0.3s cubic-bezier(.4,0,.2,1);
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(24px) scale(.97); }
            to   { opacity: 1; transform: translateY(0) scale(1); }
        }
        @keyframes fadeDown {
            from { opacity: 0; transform: translateY(-16px); }
            to   { opacity: 1; transform: none; }
        }

        .modal-icon {
            width: 54px; height: 54px; border-radius: 14px;
            background: linear-gradient(135deg,#5bb8e8,#2e8fc7);
            display: flex; align-items: center; justify-content: center;
            font-size: 1.4rem; color: #fff;
            margin: 0 auto 1.2rem;
            box-shadow: 0 4px 14px rgba(46,143,199,.35);
        }

        .modal h3 {
            font-family: 'Sora', sans-serif;
            font-size: 1.1rem; font-weight: 700;
            color: var(--text-main); margin-bottom: 6px;
        }
        .modal p { color: var(--text-muted); font-size: .85rem; margin-bottom: 1rem; }

        input[type="password"] {
            width: 100%; padding: 12px 16px;
            margin-bottom: 12px;
            border: 1.5px solid var(--card-border);
            border-radius: 12px; outline: none;
            font-family: 'Poppins', sans-serif;
            font-size: .9rem; color: var(--text-main);
            background: rgba(255,255,255,.8);
            transition: 0.3s;
        }
        input[type="password"]:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(2,132,199,.12); }

        .error {
            color: #dc2626; font-size: 0.78rem;
            margin-bottom: 12px; display: none;
            background: rgba(220,38,38,.08);
            border: 1px solid rgba(220,38,38,.2);
            border-radius: 8px; padding: 6px 12px;
        }

        .btn-row { display: flex; gap: 10px; }

        .shake { animation: shake 0.4s; }
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25%       { transform: translateX(-8px); }
            75%       { transform: translateX(8px); }
        }
    </style>
</head>
<body>

    <nav class="navbar">
        <div class="logo">Munan<span>.hub</span></div>
        <a href="index.html" class="back-btn">
            <i class="fas fa-arrow-left"></i> Home
        </a>
    </nav>

    <div class="card" id="mainCard">
        <div class="card-icon"><i class="fab fa-google-drive"></i></div>
        <h3>Private Drive</h3>
        <p>This folder is password protected. Enter the correct password to unlock and access the documents.</p>
        <button class="btn" id="unlockBtn" onclick="toggleModal(true)">
            <i class="fas fa-lock"></i> Unlock Access
        </button>
    </div>

    <div class="modal-overlay" id="overlay" onclick="handleOverlayClick(event)">
        <div class="modal">
            <div class="modal-icon"><i class="fas fa-shield-halved"></i></div>
            <h3>Security Check</h3>
            <p>Enter your password to continue</p>
            <input type="password" id="passIn" placeholder="Enter password…"
                   onkeydown="if(event.key==='Enter') verify()">
            <div class="error" id="err">
                <i class="fas fa-times-circle" style="margin-right:5px;"></i>Incorrect password. Try again.
            </div>
            <div class="btn-row">
                <button class="btn cancel" onclick="toggleModal(false)">Cancel</button>
                <button class="btn" onclick="verify()">
                    <i class="fas fa-unlock"></i> Unlock
                </button>
            </div>
        </div>
    </div>

    <script>
        const CONFIG = {
            URL:  "https://drive.google.com/drive/folders/182xz2M84kai2ZUeAjYno2avEqTyOarg5",
            PASS: "MnDV##"
        };

        const el = {
            overlay: document.getElementById('overlay'),
            input:   document.getElementById('passIn'),
            err:     document.getElementById('err'),
            btn:     document.getElementById('unlockBtn')
        };

        function toggleModal(show) {
            el.overlay.style.display = show ? 'flex' : 'none';
            if (show) {
                el.input.value = '';
                el.err.style.display = 'none';
                setTimeout(() => el.input.focus(), 100);
            }
        }

        function verify() {
            if (el.input.value === CONFIG.PASS) {
                toggleModal(false);
                window.open(CONFIG.URL, '_blank');
                el.btn.className = 'btn success';
                el.btn.innerHTML = '<i class="fas fa-external-link-alt"></i> Open Drive';
                el.btn.onclick = () => window.open(CONFIG.URL, '_blank');
            } else {
                el.err.style.display = 'block';
                el.input.classList.add('shake');
                setTimeout(() => el.input.classList.remove('shake'), 400);
                el.input.value = '';
                setTimeout(() => el.input.focus(), 100);
            }
        }

        function handleOverlayClick(e) {
            if (e.target === el.overlay) toggleModal(false);
        }
    </script>
</body>
</html>
