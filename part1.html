<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Link Hub</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root {
            --primary: #400a9f;
            --accent: #082d71;
            --glass: rgba(255, 255, 255, 0.8);
            --text: #1a3a4a;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }

        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #0077be 0%, #ffffff 100%);
            padding: 20px;
        }

        /* Card Styling */
        .card {
            background: var(--glass);
            backdrop-filter: blur(10px);
            width: 100%;
            max-width: 320px;
            padding: 2rem;
            border-radius: 24px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            border: 1px solid rgba(255,255,255,0.3);
            transition: transform 0.3s ease;
        }

        .card:hover { transform: translateY(-5px); }

        .card-icon { 
            font-size: 3rem; 
            color: var(--primary); 
            margin-bottom: 1rem;
        }

        h3 { color: var(--text); margin-bottom: 0.5rem; }
        p { color: #5a7d8f; font-size: 0.9rem; margin-bottom: 1.5rem; }

        .btn {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 12px;
            background: var(--primary);
            color: white;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            text-decoration: none;
        }

        .btn:hover { background: var(--accent); }

        /* Modal Styling */
        .modal-overlay {
            position: fixed; inset: 0;
            background: rgba(0, 30, 60, 0.4);
            backdrop-filter: blur(5px);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 100;
        }

        .modal {
            background: white;
            padding: 2rem;
            border-radius: 20px;
            width: 90%;
            max-width: 340px;
            text-align: center;
            animation: slideUp 0.3s ease-out;
        }

        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } }

        input {
            width: 100%;
            padding: 12px;
            margin: 1rem 0;
            border: 2px solid #eee;
            border-radius: 10px;
            outline: none;
            transition: 0.3s;
        }

        input:focus { border-color: var(--primary); }
        
        .error { color: #ff4757; font-size: 0.8rem; margin-bottom: 1rem; display: none; }

        .shake { animation: shake 0.4s; }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-10px); } 75% { transform: translateX(10px); } }
    </style>
</head>
<body>

    <div class="card" id="mainCard">
        <div class="card-icon"><i class="fab fa-google-drive"></i></div>
        <h3>Google Drive</h3>
        <p>Access my private documents</p>
        <button class="btn" onclick="toggleModal(true)">
            <i class="fas fa-lock"></i> Unlock Access
        </button>
    </div>

    <div class="modal-overlay" id="overlay" onclick="handleOverlayClick(event)">
        <div class="modal">
            <h3 style="margin-bottom: 10px;">Security Check</h3>
            <p>Please enter your password</p>
            <input type="password" id="passIn" placeholder="Enter password..." onkeydown="if(event.key==='Enter') verify()">
            <div class="error" id="err">Incorrect Password!</div>
            <div style="display: flex; gap: 10px;">
                <button class="btn" style="background: #eee; color: #555;" onclick="toggleModal(false)">Cancel</button>
                <button class="btn" onclick="verify()">Unlock</button>
            </div>
        </div>
    </div>

    <script>
        const CONFIG = {
            URL: "https://drive.google.com/drive/folders/182xz2M84kai2ZUeAjYno2avEqTyOarg5",
            PASS: "MnDV##"
        };

        const elements = {
            overlay: document.getElementById('overlay'),
            input: document.getElementById('passIn'),
            err: document.getElementById('err'),
            cardBtn: document.querySelector('#mainCard .btn')
        };

        function toggleModal(show) {
            elements.overlay.style.display = show ? 'flex' : 'none';
            if (show) {
                elements.input.value = '';
                elements.err.style.display = 'none';
                setTimeout(() => elements.input.focus(), 100);
            }
        }

        function verify() {
            if (elements.input.value === CONFIG.PASS) {
                toggleModal(false);
                window.open(CONFIG.URL, '_blank');
                // Change card state
                elements.cardBtn.innerHTML = '<i class="fas fa-external-link-alt"></i> Open Drive';
                elements.cardBtn.onclick = () => window.open(CONFIG.URL, '_blank');
                elements.cardBtn.style.background = '#2ed573'; 
            } else {
                elements.err.style.display = 'block';
                elements.input.classList.add('shake');
                setTimeout(() => elements.input.classList.remove('shake'), 400);
            }
        }

        function handleOverlayClick(e) {
            if (e.target === elements.overlay) toggleModal(false);
        }
    </script>
</body>
</html>
