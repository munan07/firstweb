<style>
/* ────────────────────────────────────────────
   DESIGN TOKENS  (tweak colours here)
──────────────────────────────────────────── */
:root {
  --bg-from : #b5dff5;
  --bg-to   : #eef2f6;
  --card-bg : rgba(255,255,255,.72);
  --card-bdr: rgba(195,228,248,.72);
  --text     : #1a2535;
  --text-mid : #4a5a72;
  --text-soft: #7a8fa8;
  --radius   : 18px;
  --trans    : .3s cubic-bezier(.4,0,.2,1);
}

/* ────────────────────────────────────────────
   BASE
──────────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  min-height: 100vh;
  font-family: 'DM Sans', sans-serif;
  background: linear-gradient(155deg, var(--bg-from) 0%, #cce9f7 28%, #ddf0f9 55%, var(--bg-to) 100%);
  color: var(--text);
  -webkit-font-smoothing: antialiased;
}

/* ────────────────────────────────────────────
   BACKGROUND ATMOSPHERE
──────────────────────────────────────────── */
.blobs { position: fixed; inset: 0; pointer-events: none; overflow: hidden; z-index: 0; }
.blobs div { position: absolute; border-radius: 50%; filter: blur(90px); opacity: .32; }
.b1 { width: 540px; height: 540px; background: #8ecef4; top: -130px; left: -110px; }
.b2 { width: 420px; height: 420px; background: #aaddf8; top: 35%;    right: -90px;  }
.b3 { width: 360px; height: 360px; background: #caedfb; bottom: -80px; left: 32%; }

/* ────────────────────────────────────────────
   PAGE WRAPPER
──────────────────────────────────────────── */
.page {
  position: relative; z-index: 1;
  max-width: 1100px; margin: 0 auto;
  padding: 58px 22px 80px;
}

/* ────────────────────────────────────────────
   HEADER
──────────────────────────────────────────── */
header { text-align: center; margin-bottom: 50px; animation: fadeDown .65s ease both; }

.badge {
  display: inline-flex; align-items: center; gap: 7px;
  background: rgba(255,255,255,.65);
  border: 1px solid rgba(255,255,255,.8);
  border-radius: 50px; padding: 5px 16px;
  font-family: 'Sora', sans-serif; font-size: .74rem; font-weight: 700;
  letter-spacing: .07em; text-transform: uppercase; color: #4c8eb5;
  backdrop-filter: blur(8px); margin-bottom: 18px;
}

h1 {
  font-family: 'Sora', sans-serif;
  font-size: clamp(1.9rem, 5vw, 3.1rem);
  font-weight: 700; letter-spacing: -.03em; line-height: 1.1;
  margin-bottom: 12px;
}
h1 span {
  background: linear-gradient(120deg,#2e8fc7,#4fb3e8,#87cce8);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

.sub {
  color: var(--text-mid); font-size: 1rem; font-weight: 300;
  max-width: 400px; margin: 0 auto 32px; line-height: 1.6;
}

/* ────────────────────────────────────────────
   SEARCH BAR
──────────────────────────────────────────── */
.search-wrap { display: flex; justify-content: center; }

.search-box {
  display: flex; align-items: center; gap: 11px;
  background: rgba(255,255,255,.82);
  border: 1.5px solid rgba(175,215,242,.7);
  border-radius: 50px; padding: 12px 20px;
  width: 100%; max-width: 430px;
  box-shadow: 0 4px 24px rgba(100,155,205,.14);
  backdrop-filter: blur(12px);
  transition: var(--trans);
}
.search-box:focus-within {
  border-color: #7ec8e8;
  box-shadow: 0 4px 28px rgba(80,155,205,.2), 0 0 0 4px rgba(126,200,232,.14);
}
.search-box i     { color: var(--text-soft); font-size: .9rem; }
.search-box input {
  flex: 1; border: none; background: transparent; outline: none;
  font-family: 'DM Sans', sans-serif; font-size: .96rem; color: var(--text);
}
.search-box input::placeholder { color: var(--text-soft); }
#cnt {
  font-family: 'Sora', sans-serif; font-size: .75rem; font-weight: 700;
  background: rgba(175,218,242,.4); border-radius: 20px; padding: 2px 10px;
  color: var(--text-mid); white-space: nowrap;
}

/* ────────────────────────────────────────────
   FILTER CHIPS
──────────────────────────────────────────── */
.filters {
  display: flex; flex-wrap: wrap; justify-content: center; gap: 8px;
  margin: 28px 0 38px;
  animation: fadeDown .8s .2s ease both;
}
.chip {
  background: rgba(255,255,255,.58);
  border: 1.5px solid rgba(175,215,242,.55);
  border-radius: 50px; padding: 7px 18px;
  font-family: 'Sora', sans-serif; font-size: .78rem; font-weight: 600;
  color: var(--text-mid); cursor: pointer;
  backdrop-filter: blur(6px);
  transition: var(--trans); user-select: none;
}
.chip:hover {
  background: #fff; border-color: #7ec8e8;
  color: #2e8fc7; box-shadow: 0 4px 14px rgba(80,155,205,.16);
}
.chip.active {
  background: linear-gradient(130deg,#e0f4fd,#f5fbff);
  border-color: #7ec8e8; color: #2e8fc7;
  box-shadow: 0 4px 14px rgba(80,155,205,.18);
}

/* ────────────────────────────────────────────
   CARD GRID
──────────────────────────────────────────── */
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(265px, 1fr));
  gap: 20px;
}

/* ────────────────────────────────────────────
   CARD
──────────────────────────────────────────── */
.card {
  position: relative; overflow: hidden;
  background: var(--card-bg);
  border: 1.5px solid var(--card-bdr);
  border-radius: var(--radius);
  padding: 24px 22px 20px;
  display: flex; flex-direction: column; gap: 12px;
  box-shadow: 0 2px 12px rgba(95,140,180,.10);
  backdrop-filter: blur(14px);
  transition: transform var(--trans), box-shadow var(--trans), border-color var(--trans);
  animation: cardIn .5s ease both;
}
.card:hover {
  transform: translateY(-7px) scale(1.016);
  box-shadow: 0 20px 55px rgba(60,100,150,.2);
  border-color: rgba(130,205,238,.75);
}

/* shimmer line on hover */
.card::after {
  content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px;
  border-radius: var(--radius) var(--radius) 0 0;
  background: linear-gradient(90deg, transparent, var(--ac, #7ec8e8), transparent);
  opacity: 0; transition: opacity var(--trans);
}
.card:hover::after { opacity: 1; }

.card-top {
  display: flex; align-items: flex-start; justify-content: space-between;
}

.icon {
  width: 48px; height: 48px; border-radius: 13px;
  display: flex; align-items: center; justify-content: center;
  font-size: 1.35rem; color: #fff;
  box-shadow: 0 4px 14px rgba(0,0,0,.1);
  transition: transform var(--trans);
  flex-shrink: 0;
}
.card:hover .icon { transform: scale(1.12) rotate(-4deg); }

.tag {
  font-family: 'Sora', sans-serif; font-size: .68rem; font-weight: 700;
  letter-spacing: .05em; text-transform: uppercase;
  background: rgba(175,218,242,.35); color: var(--text-soft);
  padding: 3px 10px; border-radius: 20px;
}

.name {
  font-family: 'Sora', sans-serif; font-size: 1.05rem;
  font-weight: 700; letter-spacing: -.01em; color: var(--text);
}

.desc { font-size: .875rem; color: var(--text-mid); line-height: 1.55; font-weight: 300; flex: 1; }

.btn {
  display: inline-flex; align-items: center; gap: 7px;
  padding: 8px 18px; border-radius: 50px; align-self: flex-start;
  font-family: 'Sora', sans-serif; font-size: .78rem; font-weight: 600;
  text-decoration: none; color: #2e8fc7;
  background: #fff; border: 1.5px solid rgba(130,205,240,.5);
  box-shadow: 0 2px 10px rgba(80,155,205,.1);
  transition: var(--trans);
}
.btn:hover {
  background: linear-gradient(120deg,#daf0fb,#eaf8ff);
  border-color: #7ec8e8; transform: translateX(2px);
}

/* no-results */
.empty { grid-column: 1/-1; text-align: center; padding: 60px 20px; display: none; }
.empty.show { display: block; }
.empty i { font-size: 2.4rem; color: var(--text-soft); margin-bottom: 12px; display: block; }
.empty p  { color: var(--text-mid); }

/* ────────────────────────────────────────────
   FOOTER
──────────────────────────────────────────── */
footer {
  text-align: center; margin-top: 60px;
  font-size: .8rem; color: var(--text-soft);
  font-family: 'Sora', sans-serif;
}
footer a { color: #4c8eb5; text-decoration: none; }

/* ────────────────────────────────────────────
   ANIMATIONS
──────────────────────────────────────────── */
@keyframes fadeDown { from { opacity:0; transform:translateY(-16px); } to { opacity:1; transform:none; } }
@keyframes cardIn   { from { opacity:0; transform:translateY(22px) scale(.97); } to { opacity:1; transform:none; } }

/* ────────────────────────────────────────────
   RESPONSIVE
──────────────────────────────────────────── */
@media (max-width: 580px) {
  .page { padding: 36px 14px 56px; }
  .grid { grid-template-columns: 1fr; }
}
</style>


<script>
/* Renders cards from MY_TOOLS — no need to touch this */
const grid    = document.getElementById('grid');
const input   = document.getElementById('q');
const cnt     = document.getElementById('cnt');
const filtersEl = document.getElementById('filters');

let activeFilter = 'all';

/* Build filter chips automatically from unique tags in MY_TOOLS */
const tags = ['All', ...new Set(MY_TOOLS.map(t => t.tag))];
tags.forEach(tag => {
  const chip = document.createElement('span');
  chip.className = 'chip' + (tag === 'All' ? ' active' : '');
  chip.textContent = tag;
  chip.addEventListener('click', () => {
    document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
    chip.classList.add('active');
    activeFilter = tag === 'All' ? 'all' : tag;
    render(input.value);
  });
  filtersEl.appendChild(chip);
});

function render(q) {
  q = (q || '').toLowerCase();
  const list = MY_TOOLS.filter(t => {
    const matchTag = activeFilter === 'all' || t.tag === activeFilter;
    const matchQ   = !q || t.name.toLowerCase().includes(q) || t.desc.toLowerCase().includes(q) || t.tag.toLowerCase().includes(q);
    return matchTag && matchQ;
  });

  cnt.textContent = list.length + ' tool' + (list.length !== 1 ? 's' : '');
  grid.innerHTML  = '';

  if (!list.length) {
    grid.innerHTML = `<div class="empty show">
      <i class="fa-solid fa-face-frown-open"></i>
      <p>No tools match "<b>${q || activeFilter}</b>" — try another keyword.</p>
    </div>`;
    return;
  }

  list.forEach((t, i) => {
    const card = document.createElement('div');
    card.className = 'card';
    card.style.cssText = `--ac:${t.accent}; animation-delay:${i * 0.055}s`;
    card.innerHTML = `
      <div class="card-top">
        <div class="icon" style="background:${t.iconBg}"><i class="${t.icon}"></i></div>
        <span class="tag">${t.tag}</span>
      </div>
      <div class="name">${t.name}</div>
      <div class="desc">${t.desc}</div>
      <a class="btn" href="${t.url}" target="_blank" rel="noopener">
        Open <i class="fa-solid fa-arrow-up-right-from-square" style="font-size:.7rem"></i>
      </a>
    `;
    grid.appendChild(card);
  });
}

input.addEventListener('input', e => render(e.target.value));
render();
</script>
