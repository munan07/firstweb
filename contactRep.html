<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Message Sent — Munan</title>
    <link rel="icon" type="image/png" href="icon.png">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg:      linear-gradient(180deg, #0ea5e9 0%, #bae6fd 50%, #f0f9ff 100%);
            --surface: rgba(255,255,255,0.65);
            --border:  rgba(14,165,233,0.25);
            --text:    #0f172a;
            --muted:   #334155;
            --soft:    #64748b;
            --accent:  #0284c7;
            --green:   #16a34a;
            --nav-bg:  rgba(14,165,233,0.88);
            --trans:   0.4s cubic-bezier(.4,0,.2,1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: var(--bg);
            background-attachment: fixed;
            font-family: 'Poppins', sans-serif;
            color: var(--text);
            min-height: 100vh;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            padding: 20px;
            overflow: hidden;
            -webkit-font-smoothing: antialiased;
        }

        a { text-decoration: none; }

        /* ── FLOATING BLOBS ──────────────────────── */
        .blobs { position: fixed; inset: 0; pointer-events: none; z-index: 0; overflow: hidden; }
        .blob {
            position: absolute; border-radius: 50%;
            filter: blur(80px); opacity: .35;
            animation: drift 8s ease-in-out infinite alternate;
        }
        .blob-1 { width: 500px; height: 500px; background: #7dd3fc; top: -150px; left: -100px; animation-delay: 0s; }
        .blob-2 { width: 400px; height: 400px; background: #bae6fd; bottom: -100px; right: -80px; animation-delay: -3s; }
        .blob-3 { width: 300px; height: 300px; background: #e0f2fe; top: 40%; left: 35%; animation-delay: -6s; }

        @keyframes drift {
            from { transform: translate(0, 0) scale(1); }
            to   { transform: translate(30px, 20px) scale(1.08); }
        }

        /* ── PARTICLES ───────────────────────────── */
        .particles { position: fixed; inset: 0; pointer-events: none; z-index: 0; }
        .particle {
            position: absolute; border-radius: 50%;
            background: rgba(2,132,199,.18);
            animation: float linear infinite;
        }

        @keyframes float {
            0%   { transform: translateY(100vh) scale(0); opacity: 0; }
            10%  { opacity: 1; }
            90%  { opacity: 1; }
            100% { transform: translateY(-10vh) scale(1); opacity: 0; }
        }

        /* ── NAVBAR ──────────────────────────────── */
        .navbar {
            position: fixed; top: 0; width: 100%; z-index: 100;
            display: flex; justify-content: space-between; align-items: center;
            padding: 0 8%; height: 52px;
            background: var(--nav-bg); backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(175,215,242,.4);
        }
        .nav-logo { font-size: 1.1rem; font-weight: 700; letter-spacing: 1px; color: #0f172a; }
        .nav-logo span { color: #fff; }
        .nav-links { display: flex; gap: 10px; }
        .nav-btn {
            display: inline-flex; align-items: center; gap: 8px;
            background: rgba(255,255,255,.55); border: 1.5px solid rgba(255,255,255,.6);
            border-radius: 12px; padding: 6px 14px 6px 10px;
            font-size: .78rem; font-weight: 600; color: #0f172a;
            backdrop-filter: blur(8px); transition: var(--trans);
        }
        .nav-btn:hover { background: rgba(255,255,255,.85); border-color: #7ec8e8; }
        .nav-btn-icon {
            width: 24px; height: 24px; border-radius: 6px;
            background: linear-gradient(135deg,#5bb8e8,#2e8fc7);
            display: flex; align-items: center; justify-content: center;
            color: #fff; font-size: .7rem; flex-shrink: 0;
        }

        /* ── MAIN CARD ───────────────────────────── */
        .card {
            position: relative; z-index: 10;
            background: var(--surface);
            border: 1.5px solid var(--border);
            border-radius: 28px;
            padding: 56px 48px;
            backdrop-filter: blur(20px);
            box-shadow: 0 20px 60px rgba(2,132,199,.15), inset 0 1px 0 rgba(255,255,255,.85);
            max-width: 520px; width: 100%;
            text-align: center;
            animation: popUp .7s cubic-bezier(.34,1.56,.64,1) both;
        }

        @keyframes popUp {
            from { opacity: 0; transform: scale(.88) translateY(30px); }
            to   { opacity: 1; transform: scale(1) translateY(0); }
        }

        /* ── CHECK ICON ──────────────────────────── */
        .check-wrap {
            display: flex; justify-content: center; margin-bottom: 28px;
            animation: popUp .6s .15s cubic-bezier(.34,1.56,.64,1) both;
        }
        .check-ring {
            width: 90px; height: 90px; border-radius: 50%;
            background: linear-gradient(135deg, rgba(22,163,74,.15), rgba(22,163,74,.08));
            border: 2px solid rgba(22,163,74,.3);
            display: flex; align-items: center; justify-content: center;
            position: relative;
        }
        .check-ring::before {
            content: '';
            position: absolute; inset: -6px;
            border-radius: 50%;
            border: 2px solid rgba(22,163,74,.15);
            animation: pulse-ring 2s ease-out infinite;
        }
        .check-ring::after {
            content: '';
            position: absolute; inset: -12px;
            border-radius: 50%;
            border: 1.5px solid rgba(22,163,74,.08);
            animation: pulse-ring 2s .4s ease-out infinite;
        }
        @keyframes pulse-ring {
            0%   { transform: scale(1); opacity: 1; }
            100% { transform: scale(1.4); opacity: 0; }
        }
        .check-icon {
            font-size: 2.2rem; color: var(--green);
            animation: checkBounce .5s .4s cubic-bezier(.34,1.56,.64,1) both;
        }
        @keyframes checkBounce {
            from { transform: scale(0) rotate(-15deg); opacity: 0; }
            to   { transform: scale(1) rotate(0deg);  opacity: 1; }
        }

        /* ── TEXT ────────────────────────────────── */
        .tag-pill {
            display: inline-flex; align-items: center; gap: 6px;
            background: rgba(22,163,74,.1); border: 1px solid rgba(22,163,74,.25);
            border-radius: 20px; padding: 4px 14px;
            font-size: .7rem; font-weight: 700; letter-spacing: .08em;
            text-transform: uppercase; color: var(--green);
            margin-bottom: 16px;
            animation: fadeUp .5s .3s ease both;
        }
        .main-title {
            font-size: 2rem; font-weight: 800;
            letter-spacing: -.03em; color: var(--text);
            line-height: 1.15; margin-bottom: 14px;
            animation: fadeUp .5s .4s ease both;
        }
        .main-title span { color: var(--accent); }
        .main-desc {
            font-size: .92rem; color: var(--muted);
            line-height: 1.7; font-weight: 300;
            margin-bottom: 32px;
            animation: fadeUp .5s .5s ease both;
        }
        .main-desc strong { color: var(--accent); font-weight: 600; }

        /* ── BUTTONS ─────────────────────────────── */
        .btn-group {
            display: flex; gap: 12px; justify-content: center; flex-wrap: wrap;
            animation: fadeUp .5s .6s ease both;
        }
        .btn-primary {
            display: inline-flex; align-items: center; gap: 9px;
            background: linear-gradient(135deg,#0284c7,#0ea5e9);
            color: #fff; border: none; border-radius: 12px;
            padding: 13px 28px; font-size: .88rem; font-weight: 700;
            font-family: 'Poppins', sans-serif; cursor: pointer;
            box-shadow: 0 4px 18px rgba(2,132,199,.35);
            transition: var(--trans);
        }
        .btn-primary:hover { transform: translateY(-3px); box-shadow: 0 8px 28px rgba(2,132,199,.45); }

        .btn-secondary {
            display: inline-flex; align-items: center; gap: 9px;
            background: rgba(255,255,255,.7); color: var(--accent);
            border: 1.5px solid var(--border); border-radius: 12px;
            padding: 13px 24px; font-size: .88rem; font-weight: 600;
            font-family: 'Poppins', sans-serif; cursor: pointer;
            backdrop-filter: blur(8px); transition: var(--trans);
        }
        .btn-secondary:hover { background: rgba(255,255,255,.95); border-color: var(--accent); transform: translateY(-3px); }

        /* ── DIVIDER ─────────────────────────────── */
        .divider {
            display: flex; align-items: center; gap: 14px;
            margin: 28px 0;
            animation: fadeUp .5s .55s ease both;
        }
        .divider-line { flex: 1; height: 1px; background: var(--border); }
        .divider-text { font-size: .72rem; color: var(--soft); font-weight: 500; letter-spacing: .05em; text-transform: uppercase; }

        /* ── FOOTER NOTE ─────────────────────────── */
        .footer-note {
            font-size: .75rem; color: var(--soft);
            letter-spacing: .05em; text-transform: uppercase;
            margin-top: 28px; z-index: 10; position: relative;
            animation: fadeUp .5s .7s ease both;
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(14px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        @media (max-width: 480px) {
            .card { padding: 40px 24px; border-radius: 22px; }
            .main-title { font-size: 1.6rem; }
            .btn-group { flex-direction: column; }
            .btn-primary, .btn-secondary { justify-content: center; }
        }
    </style>
</head>
<body>

    <!-- Blobs -->
    <div class="blobs">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>
    </div>

    <!-- Particles -->
    <div class="particles" id="particles"></div>

    <!-- Navbar -->
    <nav class="navbar">
        <div class="nav-logo">Munan<span>.hub</span></div>
        <div class="nav-links">
            <a href="contact.html" class="nav-btn">
                <span class="nav-btn-icon"><i class="fas fa-arrow-left"></i></span>
                Back
            </a>
            <a href="index.html" class="nav-btn">
                <span class="nav-btn-icon"><i class="fas fa-home"></i></span>
                Home
            </a>
        </div>
    </nav>

    <!-- Main Card -->
    <div class="card">

        <div class="check-wrap">
            <div class="check-ring">
                <i class="fas fa-check check-icon"></i>
            </div>
        </div>

        <div class="tag-pill"><i class="fas fa-circle-check"></i> Message Delivered</div>

        <div class="main-title">Your message<br>is on its way <span>✈️</span></div>

        <div class="main-desc">
            Thanks for reaching out! I've received your message and will get back to you as soon as possible — usually within <strong>24 hours</strong>.
        </div>

        <div class="divider">
            <div class="divider-line"></div>
            <div class="divider-text">What's next?</div>
            <div class="divider-line"></div>
        </div>

        <div class="btn-group">
            <a href="index.html" class="btn-primary">
                <i class="fas fa-home"></i> Back to Home
            </a>
            <a href="contact.html" class="btn-secondary">
                <i class="fas fa-paper-plane"></i> Send Another
            </a>
        </div>

    </div>

    <div class="footer-note">
        <i class="fas fa-hands-praying" style="margin-right:6px;opacity:.5;"></i>
        Tawakkul &amp; grind &nbsp;·&nbsp; © 2026 Munan
    </div>

    <script>
        // Generate floating particles
        const container = document.getElementById('particles');
        for (let i = 0; i < 18; i++) {
            const p = document.createElement('div');
            p.className = 'particle';
            const size = Math.random() * 10 + 4;
            p.style.cssText = `
                width: ${size}px; height: ${size}px;
                left: ${Math.random() * 100}%;
                animation-duration: ${Math.random() * 12 + 8}s;
                animation-delay: ${Math.random() * 10}s;
                opacity: ${Math.random() * 0.4 + 0.1};
            `;
            container.appendChild(p);
        }
    </script>

</body>
</html>
